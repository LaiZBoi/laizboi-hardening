# Client St0r — production docker-compose
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d
#
# By default this starts two services: `app` (Django + gunicorn) and
# `db` (MariaDB 10.11). That's the minimal install for self-hosted
# MSPs — no Redis, no Celery, no Nginx unless you opt in.
#
# Optional services (enable with --profile):
#   docker compose --profile proxy up -d   # adds Nginx reverse proxy
#   docker compose --profile cache up -d   # adds Redis (only if you've
#                                          # switched the Django cache
#                                          # backend off the default
#                                          # locmem in your .env)
#
# Persistent volumes (clientst0r-db-data, clientst0r-media,
# clientst0r-static) survive `docker compose down`. Use
# `docker compose down -v` to wipe them — DESTRUCTIVE.
#
# Compose v2+ doesn't need a `version:` field; intentionally omitted.

services:

  # ────────────────────────────────────────────────────────────────────
  # MariaDB — primary database. Switch to an external DB by setting
  # DB_HOST / DB_PORT / DB_USER / DB_PASSWORD in .env and stopping
  # this service (`docker compose stop db`).
  # ────────────────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: clientst0r-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD must be set in .env}
      MYSQL_DATABASE: ${DB_NAME:-clientst0r}
      MYSQL_USER: ${DB_USER:-clientst0r}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb/conf.d:/etc/mysql/conf.d:ro
    networks:
      - clientst0r-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_allowed_packet=256M
      --innodb_buffer_pool_size=512M

  # ────────────────────────────────────────────────────────────────────
  # Client St0r — Django app, served by gunicorn.
  # ────────────────────────────────────────────────────────────────────
  app:
    image: ${CLIENTST0R_IMAGE:-ghcr.io/laizboi/laizboi-hardening:latest}
    # Build locally if no pulled image is available. Comment out `build`
    # to force-use the published image only.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clientst0r-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_ENGINE: mysql
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-clientst0r}
      DB_USER: ${DB_USER:-clientst0r}
      DB_PASSWORD: ${DB_PASSWORD}
      UPLOAD_ROOT: /var/lib/clientst0r/uploads
      PRIVATE_FILE_SERVER: ${PRIVATE_FILE_SERVER:-nginx}
    volumes:
      - media_files:/app/media
      - static_files:/app/static_collected
      - uploads:/var/lib/clientst0r/uploads
      - ./logs:/app/logs
    ports:
      - "${WEB_PORT:-8000}:8000"
    networks:
      - clientst0r-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ────────────────────────────────────────────────────────────────────
  # Nginx — optional reverse proxy. Enable with --profile proxy.
  # Mainly useful when you want TLS termination + larger upload caps
  # in one container. Skip if you're already running an external
  # proxy (Caddy, Traefik, Cloudflare Tunnel, etc.) and pointing at
  # ${WEB_PORT}.
  # ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: clientst0r-nginx
    restart: unless-stopped
    profiles: ["proxy"]
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/app/static:ro
      - uploads:/var/lib/clientst0r/uploads:ro
    networks:
      - clientst0r-net
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ────────────────────────────────────────────────────────────────────
  # Redis — optional. The default Django cache backend is in-process
  # locmem, which doesn't need Redis. Enable this profile + flip
  # CACHE_BACKEND=redis in .env if you specifically want shared cache
  # across multiple gunicorn workers. Not required for the standard
  # single-container install.
  # ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: clientst0r-redis
    restart: unless-stopped
    profiles: ["cache"]
    volumes:
      - redis_data:/data
    networks:
      - clientst0r-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: redis-server --appendonly yes

# Persistent volumes — survive container restarts and `down`.
# Use `down -v` to wipe them (destructive).
volumes:
  db_data:
    name: clientst0r-db-data
  redis_data:
    name: clientst0r-redis-data
  media_files:
    name: clientst0r-media
  static_files:
    name: clientst0r-static
  uploads:
    name: clientst0r-uploads

networks:
  clientst0r-net:
    name: clientst0r-net
    driver: bridge
