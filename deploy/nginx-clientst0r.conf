# Client St0r — Nginx site config for VPS deployment
#
# Install:
#   sudo cp deploy/nginx-clientst0r.conf /etc/nginx/sites-available/clientst0r
#   sudo ln -sf /etc/nginx/sites-available/clientst0r /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace docs.example.com with your hostname before enabling TLS.
# Example production host for this fork: psa.laizboi.com

upstream clientst0r_app {
    server 127.0.0.1:8000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name docs.example.com;

    client_max_body_size 100m;

    access_log /var/log/nginx/clientst0r-access.log;
    error_log /var/log/nginx/clientst0r-error.log;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /static/ {
        alias /opt/clientst0r/static_collected/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /internal_uploads/ {
        internal;
        alias /var/lib/clientst0r/uploads/;
    }

    location /health/ {
        proxy_pass http://clientst0r_app;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://clientst0r_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_redirect off;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# After Certbot: certbot --nginx -d docs.example.com
