# Client St0r — Apache site config for VPS deployment
#
# Use when Apache already owns ports 80/443 (coexists with other vhosts via ServerName).
#
# Install:
#   sudo apt install -y libapache2-mod-xsendfile python3-certbot-apache
#   sudo a2enmod proxy proxy_http headers ssl xsendfile
#   sudo cp deploy/apache-clientst0r.conf /etc/apache2/sites-available/clientst0r.conf
#   sudo a2ensite clientst0r
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d psa.laizboi.com
#
# After Certbot creates the :443 vhost, copy these directives into the SSL block too:
#   XSendFile On
#   XSendFilePath /var/lib/clientst0r/uploads
#   RequestHeader set X-Forwarded-Proto "https"
#
# Set PRIVATE_FILE_SERVER=apache in /etc/clientst0r/.env

<VirtualHost *:80>
    ServerName psa.laizboi.com

    LimitRequestBody 104857600

    XSendFile On
    XSendFilePath /var/lib/clientst0r/uploads

    Alias /static/ /opt/clientst0r/static_collected/
    <Directory /opt/clientst0r/static_collected/>
        Require all granted
        Options -Indexes
    </Directory>

    # Block direct public access to upload storage (matches nginx "internal")
    Alias /internal_uploads/ /var/lib/clientst0r/uploads/
    <Directory /var/lib/clientst0r/uploads/>
        Require all denied
    </Directory>

    ProxyPreserveHost On
    ProxyPass /static/ !
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Host "psa.laizboi.com"

    ErrorLog ${APACHE_LOG_DIR}/clientst0r-error.log
    CustomLog ${APACHE_LOG_DIR}/clientst0r-access.log combined
</VirtualHost>
