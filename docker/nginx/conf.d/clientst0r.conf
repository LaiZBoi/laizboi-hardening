# Client St0r — nginx reverse-proxy site config (Docker proxy profile).
#
# Loaded by: docker compose --profile proxy up -d
# With host port lockdown: add -f docker-compose.proxy.yml
#
# TLS: drop cert.pem + key.pem into ./docker/nginx/ssl/ and uncomment the
# HTTPS server block below.

upstream clientst0r {
    server app:8000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name psa.laizboi.com;

    # Uncomment after TLS is configured on the block below.
    # return 301 https://$host$request_uri;

    client_max_body_size 100m;

    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /internal_uploads/ {
        internal;
        alias /var/lib/clientst0r/uploads/;
    }

    location /health/ {
        proxy_pass http://clientst0r;
        proxy_set_header Host $host;
        access_log off;
    }

    location / {
        proxy_pass http://clientst0r;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_redirect off;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

