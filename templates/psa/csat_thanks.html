<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Thanks! — {{ survey.ticket.ticket_number }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<style>
body { background: #f7f8fa; }
.csat-card { max-width: 560px; margin: 60px auto; }
</style>
</head>
<body>
<div class="csat-card">
    <div class="card shadow-sm">
        <div class="card-body p-4 text-center">
            <i class="fas fa-circle-check text-success" style="font-size: 3rem;"></i>
            <h1 class="h3 mt-3 mb-1">Thanks for your feedback!</h1>
            <p class="text-muted mb-2">
                {{ survey.ticket.organization.name }} —
                {{ survey.ticket.ticket_number }}
            </p>
            <p class="mb-3">
                You rated this support interaction
                <strong>{{ survey.rating }} of 5</strong>.
            </p>
            <p class="text-muted small mb-0">
                You can close this tab. If you need to follow up, contact us
                referencing ticket <strong>{{ survey.ticket.ticket_number }}</strong>.
            </p>
        </div>
    </div>
</div>
</body>
</html>
