# Build + publish the Client St0r Docker image.
#
# • PR and push events build the image to verify the Dockerfile still works.
# • Push to `main` or a `v*` tag publishes to ghcr.io/agit8or1/clientst0r
#   with the appropriate tags (sha, latest, semver).
# • Buildx caches layers between runs via GHA's built-in cache.

name: docker-image

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - 'docker-entrypoint.sh'
      - 'requirements.txt'
      - 'config/**'
      - 'core/**'
      - 'accounts/**'
      - 'assets/**'
      - 'vault/**'
      - 'docs/**'
      - 'psa/**'
      - 'integrations/**'
      - 'monitoring/**'
      - 'scheduling/**'
      - 'reports/**'
      - 'crm/**'
      - 'compliance/**'
      - 'security_alerts/**'
      - 'inventory/**'
      - 'vehicles/**'
      - 'portal/**'
      - 'resourcing/**'
      - 'processes/**'
      - 'imports/**'
      - 'files/**'
      - 'locations/**'
      - 'field_ops/**'
      - 'psa_ai/**'
      - 'api/**'
      - 'api_mobile/**'
      - 'audit/**'
      - 'static/**'
      - 'templates/**'
      - '.github/workflows/docker-image.yml'
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}    # = agit8or1/clientst0r

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Don't try to log in for PRs from forks — no PACKAGES write
        # token, and we can still validate the build without pushing.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Produces: latest (on main), v3.17.490 (on tag),
          # 3.17.490 (semver), sha-abc1234 (every build).
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build (+ push on main / tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          # Multi-arch (linux/arm64) doubles build time; leave it
          # off by default. Add it back here if you start shipping
          # to ARM hosts (e.g. Raspberry Pi MSPs):
          #   platforms: linux/amd64,linux/arm64
